<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Students · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=10">
<style>
  a.slink{color:var(--navy);font-weight:700;text-decoration:none}
  a.slink:hover{text-decoration:underline}
</style>
</head>
<body>
<div id="view">
  <div class="toolbar">
    <div class="sub" id="s-count">Loading your roster…</div>
    <button class="btn btn-gold" id="add-btn">+ Add student</button>
  </div>
  <input id="s-search" type="search" placeholder="Search by name, parent, level or contact…" style="width:100%;padding:10px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;margin-bottom:14px">

  <div class="card">
    <div class="empty" id="s-empty" style="display:none">
      <h3>No students yet</h3>
      <p>Add your first student to start logging lessons against them.</p>
    </div>
    <div class="tscroll"><table class="tbl" id="s-table" style="display:none">
      <thead><tr>
        <th>Name</th><th>Parent</th><th>Level</th><th>Contact</th><th></th>
      </tr></thead>
      <tbody id="s-body"></tbody>
    </table></div>
  </div>

  <div class="section-title disc-head" id="disc-title" style="display:none">
    Discontinued <span class="hint" id="disc-hint"></span>
  </div>
  <div class="card" id="disc-card" style="display:none">
    <div class="tscroll"><table class="tbl">
      <thead><tr><th>Name</th><th>Parent</th><th>Level</th><th>Contact</th><th></th></tr></thead>
      <tbody id="disc-body"></tbody>
    </table></div>
  </div>

  <!-- add / edit modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal card">
      <h2 id="m-title">Add student</h2>
      <div class="field">
        <label for="m-name">Name</label>
        <input id="m-name" type="text" placeholder="e.g. Qin Heng">
      </div>
      <div class="field">
        <label for="m-level">Level</label>
        <input id="m-level" type="text" placeholder="e.g. Sec 3 G3">
      </div>
      <div class="field">
        <label for="m-contact">Contact <span class="muted">(for reminders)</span></label>
        <input id="m-contact" type="text" placeholder="e.g. +65 8123 4567">
      </div>
      <div class="field">
        <label for="m-recipient">Message recipient <span class="muted">(e.g. parent's name — used in WhatsApp messages)</span></label>
        <input id="m-recipient" type="text" placeholder="leave blank to address the student">
      </div>
      <div class="field">
        <label for="m-notes">Notes</label>
        <input id="m-notes" type="text" placeholder="optional">
      </div>
      <div class="msg" id="m-msg"></div>
      <div class="modal-actions">
        <button class="btn" id="m-cancel">Cancel</button>
        <button class="btn btn-primary" id="m-save">Save student</button>
      </div>
    </div>
  </div>

  <!-- merge modal -->
  <div class="modal-backdrop" id="merge-modal">
    <div class="modal card">
      <h2>Merge student</h2>
      <p class="muted" style="font-size:13.5px;margin-bottom:16px">
        Move all lessons, slots and exams from <b id="mg-source"></b> onto another
        student, then remove the duplicate. Nothing is lost.</p>
      <div class="field">
        <label for="mg-target">Merge into</label>
        <select id="mg-target"></select>
      </div>
      <div class="msg" id="mg-msg"></div>
      <div class="modal-actions">
        <button class="btn" id="mg-cancel">Cancel</button>
        <button class="btn btn-primary" id="mg-save">Merge &amp; remove duplicate</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=10"></script>
<script src="assets/js/supabase.js?v=10"></script>
<script src="assets/js/app.js?v=10"></script>
<script src="assets/js/students.js?v=10"></script>
</body>
</html>
