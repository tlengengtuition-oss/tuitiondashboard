<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teaching materials · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=30">
<style>
  .mat-bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:14px}
  .crumbs{display:flex;flex-wrap:wrap;align-items:center;gap:2px;font-size:14.5px;min-width:0}
  .crumbs a{color:var(--teal);font-weight:700;text-decoration:none;cursor:pointer;padding:2px 4px;border-radius:6px}
  .crumbs a:hover{background:var(--cream)}
  .crumbs .cur{color:var(--navy);font-weight:800;padding:2px 4px}
  .crumbs .sep{color:var(--muted)}
  .mat-actions{display:flex;gap:8px;flex:0 0 auto}
  .row-item{display:flex;align-items:center;gap:13px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .row-item:last-child{border-bottom:none}
  .ri-ic{flex:0 0 38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff}
  .ri-ic.folder{background:var(--navy);font-size:18px}
  .ri-ic.slides{background:#B5892B}
  .ri-ic.worksheet{background:#0E7C7B}
  .ri-ic.other{background:#8a8577}
  .ri-body{flex:1;min-width:0}
  .ri-body.click{cursor:pointer}
  .ri-title{font-weight:700;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ri-sub{color:var(--muted);font-size:12px;margin-top:1px}
  .ri-act{flex:0 0 auto;display:flex;gap:6px}
  .ri-act button{all:unset;cursor:pointer;font-size:12.5px;font-weight:700;border-radius:8px;padding:6px 11px;border:1px solid var(--line);color:var(--navy)}
  .ri-act button.rm{color:var(--owed);border-color:transparent}
  .mat-empty{color:var(--muted);font-size:14px;padding:22px 4px}
  .noaccess{max-width:440px;margin:40px auto;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<div id="view">
  <div id="mat-app">
    <div class="mat-bar">
      <div class="crumbs" id="crumbs"></div>
      <div class="mat-actions">
        <button class="btn" id="newfolder-btn">+ Folder</button>
        <button class="btn btn-gold" id="add-btn">+ Upload</button>
      </div>
    </div>
    <div class="card panel" style="padding:6px 16px">
      <div id="mat-list"><div class="mat-empty">Loading…</div></div>
    </div>
  </div>

  <div class="noaccess" id="mat-noaccess" style="display:none">
    <h2>Not available</h2>
    <p>The materials library isn't available on this account.</p>
    <a class="btn" href="app.html">Back to dashboard</a>
  </div>

  <div class="modal-backdrop" id="u-modal">
    <div class="modal card">
      <h2 id="u-title">Upload material</h2>
      <p class="muted" id="u-where" style="font-size:13px;margin-bottom:12px"></p>
      <div class="field">
        <label for="u-file">File <span class="muted">(pptx, docx, pdf…)</span></label>
        <input id="u-file" type="file" accept=".pptx,.ppt,.docx,.doc,.pdf,.xlsx,.zip">
      </div>
      <div class="field"><label for="u-title-in">Name</label><input id="u-title-in" type="text" placeholder="e.g. Quadratics — Lesson Slides"></div>
      <div class="msg" id="u-msg"></div>
      <div class="modal-actions">
        <button class="btn" id="u-cancel">Cancel</button>
        <button class="btn btn-primary" id="u-save">Upload</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/materials.js"></script>
</body>
</html>
