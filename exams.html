<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exams · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=41">
</head>
<body>
<div id="view">
  <div class="toolbar">
    <div class="sub" id="x-count">Loading exams…</div>
    <button class="btn btn-gold" id="add-btn">+ Add exam</button>
  </div>

  <div class="section-title">Upcoming <span class="hint" id="up-hint"></span></div>
  <div class="card">
    <div class="empty" id="up-empty" style="display:none"><h3>No upcoming exams</h3></div>
    <div class="tscroll"><table class="tbl" id="up-table" style="display:none">
      <thead><tr><th>Date</th><th>Student</th><th>Type</th><th>Subject</th><th>Topics</th><th>In</th><th></th></tr></thead>
      <tbody id="up-body"></tbody>
    </table></div>
  </div>

  <div class="section-title" id="past-title" style="display:none">Past</div>
  <div class="card" id="past-card" style="display:none">
    <div class="tscroll"><table class="tbl">
      <thead><tr><th>Date</th><th>Student</th><th>Type</th><th>Subject</th><th>Topics</th><th>Result</th><th></th></tr></thead>
      <tbody id="past-body"></tbody>
    </table></div>
  </div>

  <!-- add / edit modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal card">
      <h2 id="m-title">Add exam</h2>
      <div class="field"><label for="m-student">Student</label><select id="m-student"></select></div>
      <div class="row2">
        <div class="field"><label for="m-date">Exam date</label><input id="m-date" type="date"></div>
        <div class="field"><label for="m-type">Type</label>
          <input id="m-type" list="type-list" type="text" placeholder="e.g. WA1, PSLE">
          <datalist id="type-list">
            <option value="WA1"><option value="WA2"><option value="WA3">
            <option value="SA1"><option value="SA2"><option value="CA1"><option value="CA2">
            <option value="Mid-Year"><option value="End-Year"><option value="Prelim">
            <option value="PSLE"><option value="N-Level"><option value="O-Level"><option value="A-Level">
            <option value="Class Test"><option value="Common Test">
          </datalist>
        </div>
      </div>
      <div class="field"><label for="m-subject">Subject</label><input id="m-subject" type="text" placeholder="e.g. A-Math"></div>
      <div class="row2">
        <div class="field"><label for="m-score">Score <span class="muted">(marks — leave blank if not sat)</span></label><input id="m-score" type="number" min="0" step="0.5" placeholder="optional"></div>
        <div class="field"><label for="m-maxscore">Out of</label><input id="m-maxscore" type="number" min="1" step="0.5" placeholder="e.g. 100"></div>
      </div>
      <div class="field"><label for="m-topics">Topics</label><input id="m-topics" type="text" placeholder="e.g. Quadratics, Indices"></div>
      <div class="field"><label for="m-remarks">Remarks</label><input id="m-remarks" type="text" placeholder="optional"></div>
      <div class="msg" id="m-msg"></div>
      <div class="modal-actions">
        <button class="btn" id="m-cancel">Cancel</button>
        <button class="btn btn-primary" id="m-save">Save exam</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=41"></script>
<script src="assets/js/supabase.js?v=41"></script>
<script src="assets/js/app.js?v=41"></script>
<script src="assets/js/exams.js?v=41"></script>
</body>
</html>
