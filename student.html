<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=9">
<style>
  .pinfo{display:grid;gap:9px}
  .pinfo-row{display:flex;gap:14px;align-items:baseline;font-size:14px}
  .pinfo-k{flex:0 0 100px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  .pinfo-v{color:var(--ink);min-width:0;word-break:break-word}
  @media(max-width:520px){ .pinfo-row{flex-direction:column;gap:2px} .pinfo-k{flex:none} }
  .field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;
    font:inherit;background:#fffdf8;color:var(--ink);resize:vertical;line-height:1.45}
  .field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(181,137,43,.18)}
  .ncell{white-space:pre-wrap}
</style>
</head>
<body>
<div id="view">
  <div class="toolbar">
    <a class="btn" href="students.html">‹ Back to students</a>
    <span id="p-actions"></span>
  </div>

  <div id="p-head"></div>

  <div class="kpi-grid" id="p-kpis"></div>

  <div class="grid2">
    <div>
      <div class="section-title">Lesson history <span class="hint" id="p-lhint"></span></div>
      <div class="card">
        <div class="empty" id="p-lempty" style="display:none"><h3>No lessons logged yet</h3></div>
        <table class="tbl" id="p-ltable" style="display:none">
          <thead><tr><th>Date</th><th>Subject</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody id="p-lbody"></tbody>
        </table>
      </div>
    </div>
    <div>
      <div class="section-title">Weekly slots</div>
      <div class="card" id="p-slots"></div>

      <div class="section-title">Exams</div>
      <div class="card" id="p-exams"></div>
    </div>
  </div>

  <div class="section-title">Lesson notes <span class="hint" id="p-nhint"></span>
    <span class="muted" style="margin-left:auto;font-size:12.5px">topics, homework &amp; plans</span>
  </div>
  <div class="card">
    <div class="empty" id="p-nempty" style="display:none"><h3>No lessons to annotate yet</h3></div>
    <table class="tbl" id="p-ntable" style="display:none">
      <thead><tr><th>Date</th><th>Subject</th><th>Topics covered</th><th>Homework</th><th>Remarks / next lesson</th><th></th></tr></thead>
      <tbody id="p-nbody"></tbody>
    </table>
  </div>

  <!-- notes edit modal -->
  <div class="modal-backdrop" id="n-modal">
    <div class="modal card">
      <h2 id="n-title">Lesson notes</h2>
      <div class="field"><label for="n-topics">Topics covered</label><textarea id="n-topics" rows="2" placeholder="What was taught"></textarea></div>
      <div class="field"><label for="n-homework">Homework given</label><textarea id="n-homework" rows="2" placeholder="Assigned work"></textarea></div>
      <div class="field"><label for="n-remarks">Remarks / plan for next lesson</label><textarea id="n-remarks" rows="2" placeholder="Notes, what to cover next"></textarea></div>
      <div class="msg" id="n-msg"></div>
      <div class="modal-actions">
        <button class="btn" id="n-cancel">Cancel</button>
        <button class="btn btn-primary" id="n-save">Save notes</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/student.js"></script>
</body>
</html>
