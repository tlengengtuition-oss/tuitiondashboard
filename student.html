<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=37">
<style>
  /* borderless header meta strip */
  .phead{display:flex;flex-wrap:wrap;gap:10px 28px;align-items:baseline;margin:2px 2px 10px}
  .phead .pi{display:flex;flex-direction:column;gap:3px}
  .phead .pi .k{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  .phead .pi .v{font-size:14.5px;color:var(--ink)}
  /* compact per-lesson notes list */
  #p-notes{padding:4px 16px}
  .nlist{display:flex;flex-direction:column}
  .nrow{padding:13px 0;border-bottom:1px solid var(--line)}
  .nrow:last-child{border-bottom:none}
  .nhead{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .nd{font-weight:700;font-size:14px}
  .nbits{margin-top:6px;font-size:13px;color:var(--ink);white-space:pre-wrap;line-height:1.45}
  .nk{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-right:6px}
  .nempty{margin-top:3px;color:var(--muted);font-size:12px;font-style:italic}
  a.slink{color:var(--navy);font-weight:700;text-decoration:none;font-size:13px}
  a.slink:hover{text-decoration:underline}
  /* weekly slots list */
  #p-slots{padding:4px 16px}
  .slotline{display:flex;align-items:baseline;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .slotline .slt{font-weight:700;font-size:13.5px;color:var(--navy);white-space:nowrap}
  .slotline .slsub{flex:1;min-width:0;font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slotline .slc{font-weight:700;font-size:12.5px;color:var(--teal);white-space:nowrap}
  a.plink{display:block;padding:11px 0 3px;text-align:right}
  /* notes modal textareas */
  .field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;
    font:inherit;background:#fffdf8;color:var(--ink);resize:vertical;line-height:1.45}
  .field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(181,137,43,.18)}
</style>
</head>
<body>
<div id="view">
  <div class="toolbar">
    <a class="btn" href="students.html">‹ Back to students</a>
    <span id="p-actions"></span>
  </div>

  <div id="p-head"></div>

  <div class="kpi-grid" id="p-kpis"></div>

  <div class="grid2">
    <div>
      <div class="section-title">Lesson history <span class="hint" id="p-lhint"></span></div>
      <div class="card">
        <div class="empty" id="p-lempty" style="display:none"><h3>No lessons logged yet</h3></div>
        <table class="tbl" id="p-ltable" style="display:none">
          <thead><tr><th>Date</th><th>Subject</th><th>Amount</th><th>Status</th><th></th></tr></thead>
          <tbody id="p-lbody"></tbody>
        </table>
      </div>
    </div>
    <div>
      <div class="section-title">Weekly slots</div>
      <div class="card" id="p-slots"></div>

      <div class="section-title">Progress</div>
      <div class="card" id="p-progress-card" style="display:none"><div id="p-progress"></div></div>

      <div class="section-title">Exams <button class="btn" id="p-addexam" style="margin-left:auto;padding:5px 11px;font-size:13px">+ Add</button></div>
      <div class="card" id="p-exams"></div>

      <div class="section-title">Lesson notes <span class="hint" id="p-nhint"></span></div>
      <div class="card" id="p-notes"></div>
    </div>
  </div>

  <!-- edit student modal -->
  <div class="modal-backdrop" id="e-modal">
    <div class="modal card">
      <h2>Edit student</h2>
      <div class="field"><label for="e-name">Name</label><input id="e-name" type="text"></div>
      <div class="field"><label for="e-level">Level</label><input id="e-level" type="text" placeholder="e.g. Sec 3 G3"></div>
      <div class="field"><label for="e-contact">Contact <span class="muted">(for reminders)</span></label><input id="e-contact" type="text" placeholder="e.g. +65 8123 4567"></div>
      <div class="field"><label for="e-recipient">Message recipient <span class="muted">(e.g. parent's name)</span></label><input id="e-recipient" type="text" placeholder="leave blank to address the student"></div>
      <div class="field"><label for="e-notes">Notes</label><input id="e-notes" type="text" placeholder="optional"></div>
      <div class="msg" id="e-msg"></div>
      <div class="modal-actions">
        <button class="btn" id="e-cancel">Cancel</button>
        <button class="btn btn-primary" id="e-save">Save changes</button>
      </div>
    </div>
  </div>

  <!-- lesson edit modal -->
  <div class="modal-backdrop" id="l-modal">
    <div class="modal card">
      <h2 id="l-title">Edit lesson</h2>
      <div class="row2">
        <div class="field"><label for="l-date">Date</label><input id="l-date" type="date"></div>
        <div class="field"><label for="l-subject">Subject</label><input id="l-subject" type="text" placeholder="e.g. Math"></div>
      </div>
      <div class="row2">
        <div class="field"><label for="l-amount">Amount (S$)</label><input id="l-amount" type="number" step="0.01" min="0"></div>
        <div class="field"><label>Payment</label>
          <label style="display:flex;align-items:center;gap:8px;padding:10px 0;font-weight:normal"><input id="l-paid" type="checkbox"> Paid</label></div>
      </div>
      <div class="msg" id="l-msg"></div>
      <div class="modal-actions" style="justify-content:space-between">
        <button class="btn" id="l-del" style="color:var(--owed)">Delete</button>
        <span style="display:inline-flex;gap:8px">
          <button class="btn" id="l-toggle">Cancel lesson</button>
          <button class="btn btn-primary" id="l-save">Save</button>
        </span>
      </div>
    </div>
  </div>

  <!-- exam edit modal -->
  <div class="modal-backdrop" id="x-modal">
    <div class="modal card">
      <h2 id="x-title">Add exam</h2>
      <div class="row2">
        <div class="field"><label for="x-date">Exam date</label><input id="x-date" type="date"></div>
        <div class="field"><label for="x-type">Type</label>
          <input id="x-type" list="x-typelist" type="text" placeholder="e.g. WA1, PSLE">
          <datalist id="x-typelist">
            <option value="WA1"><option value="WA2"><option value="WA3"><option value="SA1"><option value="SA2">
            <option value="CA1"><option value="CA2"><option value="Mid-Year"><option value="End-Year">
            <option value="Prelim"><option value="PSLE"><option value="N-Level"><option value="O-Level"><option value="A-Level">
            <option value="Class Test"><option value="Common Test">
          </datalist>
        </div>
      </div>
      <div class="field"><label for="x-subject">Subject</label><input id="x-subject" type="text" placeholder="e.g. A-Math"></div>
      <div class="row2">
        <div class="field"><label for="x-score">Score <span class="muted">(marks)</span></label><input id="x-score" type="number" min="0" step="0.5" placeholder="optional"></div>
        <div class="field"><label for="x-maxscore">Out of</label><input id="x-maxscore" type="number" min="1" step="0.5" placeholder="e.g. 100"></div>
      </div>
      <div class="field"><label for="x-topics">Topics</label><input id="x-topics" type="text" placeholder="e.g. Quadratics"></div>
      <div class="field"><label for="x-remarks">Remarks</label><input id="x-remarks" type="text" placeholder="optional"></div>
      <div class="msg" id="x-msg"></div>
      <div class="modal-actions" style="justify-content:space-between">
        <button class="btn" id="x-del" style="color:var(--owed)">Delete</button>
        <span style="display:inline-flex;gap:8px">
          <button class="btn" id="x-close">Cancel</button>
          <button class="btn btn-primary" id="x-save">Save exam</button>
        </span>
      </div>
    </div>
  </div>

  <!-- notes edit modal -->
  <div class="modal-backdrop" id="n-modal">
    <div class="modal card">
      <h2 id="n-title">Lesson notes</h2>
      <div class="field"><label for="n-topics">Topics covered</label><textarea id="n-topics" rows="2" placeholder="What was taught"></textarea></div>
      <div class="field"><label for="n-homework">Homework given</label><textarea id="n-homework" rows="2" placeholder="Assigned work"></textarea></div>
      <div class="field"><label for="n-remarks">Remarks / plan for next lesson</label><textarea id="n-remarks" rows="2" placeholder="Notes, what to cover next"></textarea></div>
      <div class="msg" id="n-msg"></div>
      <div class="modal-actions">
        <button class="btn" id="n-cancel">Cancel</button>
        <button class="btn btn-primary" id="n-save">Save notes</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=37"></script>
<script src="assets/js/supabase.js?v=37"></script>
<script src="assets/js/app.js?v=37"></script>
<script src="assets/js/student.js?v=37"></script>
</body>
</html>
