<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=35">
<style>
  .oauth-div{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:12.5px}
  .oauth-div::before,.oauth-div::after{content:"";flex:1;height:1px;background:var(--line)}
  .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 14px;
    font-weight:700;font-size:14.5px;color:var(--ink);cursor:pointer}
  .btn-google:hover{background:#faf8f2;border-color:#d8cfb8}
  .btn-google svg{width:18px;height:18px;flex:0 0 18px}
  .link-btn{all:unset;cursor:pointer;color:var(--teal);font-weight:700;font-size:13px;
    display:inline-block;margin-top:12px}
  .link-btn:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand"><span class="mono">TL</span>
      <span><b>T-Leng Tuition</b><small>Dashboard</small></span></div>

    <!-- sign in / sign up form -->
    <div id="form-area">
      <div class="tabs">
        <button id="tab-in" class="on">Sign in</button>
        <button id="tab-up">Create account</button>
      </div>
      <div class="field" id="name-field" style="display:none">
        <label for="name">Business name</label>
        <input id="name" type="text" autocomplete="organization" placeholder="T-Leng Tuition">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="pw">Password</label>
        <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <label id="consent-field" style="display:none;align-items:flex-start;gap:9px;font-size:12.5px;color:var(--muted);margin:2px 0 14px;line-height:1.5;cursor:pointer">
        <input id="consent" type="checkbox" style="width:16px;height:16px;margin-top:1px;flex:0 0 auto;accent-color:var(--teal)">
        <span>I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>, and consent to my data being handled as described (PDPA).</span>
      </label>
      <button class="btn btn-primary" id="go">Sign in</button>
      <div class="msg" id="msg"></div>
      <button class="link-btn" id="forgot" type="button">Forgot password?</button>
      <div class="oauth-div">or</div>
      <button class="btn-google" id="google" type="button">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- account-created success state -->
    <div id="created" style="display:none">
      <div class="ok-check">✓</div>
      <h2>Account created</h2>
      <p class="created-msg" id="created-msg"></p>
      <button class="btn btn-primary" id="to-login">Go to sign in</button>
    </div>

    <!-- two-factor challenge -->
    <div id="mfa-area" style="display:none">
      <h2>Two-step verification</h2>
      <p class="created-msg">Enter the 6-digit code from your authenticator app to finish signing in.</p>
      <div class="field">
        <label for="mfacode">Authentication code</label>
        <input id="mfacode" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456">
      </div>
      <button class="btn btn-primary" id="mfa-go">Verify</button>
      <div class="msg" id="mfa-msg"></div>
      <button class="link-btn" id="mfa-signout" type="button">Use a different account</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=35"></script>
<script src="assets/js/supabase.js?v=35"></script>
<script>
(function () {
  var mode = "in";
  var $ = function (id) { return document.getElementById(id); };
  var msg = $("msg");

  function setMode(m) {
    mode = m;
    $("tab-in").classList.toggle("on", m === "in");
    $("tab-up").classList.toggle("on", m === "up");
    $("name-field").style.display = m === "up" ? "block" : "none";
    $("consent-field").style.display = m === "up" ? "flex" : "none";
    if (m !== "up" && $("consent")) $("consent").checked = false;
    $("go").textContent = m === "up" ? "Create account" : "Sign in";
    $("forgot").style.display = m === "up" ? "none" : "inline-block";
    $("pw").autocomplete = m === "up" ? "new-password" : "current-password";
    msg.textContent = ""; msg.className = "msg";
  }
  $("tab-in").onclick = function () { setMode("in"); };
  $("tab-up").onclick = function () { setMode("up"); };

  function show(text, ok) { msg.textContent = text; msg.className = "msg " + (ok ? "ok" : "err"); }

  function showCreated(email, confirmNeeded) {
    $("form-area").style.display = "none";
    $("created").style.display = "block";
    $("created-msg").innerHTML = confirmNeeded
      ? "We've sent a confirmation link to <b>" + email + "</b>. Open it to verify your " +
        "address, then come back and sign in.<br><br>Didn't get it? Check spam, or your project " +
        "may have email confirmation disabled — in which case you can just sign in now."
      : "Your account <b>" + email + "</b> is ready. You can sign in now.";
  }
  $("to-login").onclick = function () {
    $("created").style.display = "none";
    $("form-area").style.display = "block";
    $("pw").value = ""; setMode("in"); $("email").focus();
  };

  if (!window.TL_CONFIGURED) {
    show("Set your Supabase URL + anon key in assets/js/config.js first.", false);
  } else {
    window.sb.auth.getSession().then(async function (r) {
      if (r.data && r.data.session) {
        if (await needsMfa()) { startChallenge(); return; }
        location.replace("app.html");
      }
    });
  }

  // --- Two-factor challenge ---
  var challengeFactorId = null;
  async function needsMfa() {
    try {
      var a = await window.sb.auth.mfa.getAuthenticatorAssuranceLevel();
      return a.data && a.data.currentLevel === "aal1" && a.data.nextLevel === "aal2";
    } catch (e) { return false; }
  }
  async function startChallenge() {
    try {
      var lf = await window.sb.auth.mfa.listFactors();
      var totp = (lf.data && lf.data.totp || []).filter(function(f){return f.status==="verified";})[0];
      if (!totp) { location.replace("app.html"); return; }  // nothing to challenge
      challengeFactorId = totp.id;
    } catch (e) { location.replace("app.html"); return; }
    $("form-area").style.display = "none";
    $("created").style.display = "none";
    $("mfa-area").style.display = "block";
    $("mfacode").focus();
  }
  $("mfa-go").onclick = async function () {
    var code = ($("mfacode").value || "").trim(), m = $("mfa-msg");
    if (!/^\d{6}$/.test(code)) { m.textContent = "Enter the 6-digit code."; m.className = "msg err"; return; }
    $("mfa-go").disabled = true;
    try {
      var r = await window.sb.auth.mfa.challengeAndVerify({ factorId: challengeFactorId, code: code });
      if (r.error) throw r.error;
      location.replace("app.html");
    } catch (e) {
      m.textContent = e.message || "That code didn't match. Try the current one.";
      m.className = "msg err";
      $("mfa-go").disabled = false;
    }
  };
  $("mfacode").addEventListener("keydown", function (e) { if (e.key === "Enter") $("mfa-go").click(); });
  $("mfa-signout").onclick = function () {
    window.sb.auth.signOut().then(function () {
      $("mfa-area").style.display = "none";
      $("form-area").style.display = "block";
      $("mfacode").value = ""; $("email").focus();
    });
  };

  $("go").onclick = async function () {
    if (!window.TL_CONFIGURED) return;
    var email = $("email").value.trim(), pw = $("pw").value;
    if (!email || !pw) { show("Enter your email and password.", false); return; }
    $("go").disabled = true;
    try {
      if (mode === "up") {
        var biz = $("name").value.trim();
        if (!$("consent").checked) { show("Please accept the Terms and Privacy Policy to create an account.", false); return; }
        var up = await window.sb.auth.signUp(
          { email: email, password: pw, options: { data: { business_name: biz,
            consent_version: "v1", consent_accepted_at: new Date().toISOString() },
            emailRedirectTo: new URL("confirmed.html", location.href).href } });
        if (up.error) throw up.error;
        if (up.data.session) {
          // Confirm-email off: we're logged in, so persist the business name onto the
          // profile the signup trigger just created (RLS needs this session). Non-fatal —
          // it can always be set later in Settings.
          if (biz) { try { await window.sb.from("profiles").update({ business_name: biz }).eq("id", up.data.user.id); } catch (e) {} }
          location.replace("app.html"); return;
        }
        showCreated(email, true);                                         // confirm on → success screen
      } else {
        var inn = await window.sb.auth.signInWithPassword({ email: email, password: pw });
        if (inn.error) throw inn.error;
        if (await needsMfa()) { startChallenge(); return; }
        location.replace("app.html");
      }
    } catch (e) {
      show(e.message || "Something went wrong.", false);
    } finally {
      $("go").disabled = false;
    }
  };

  $("pw").addEventListener("keydown", function (e) { if (e.key === "Enter") $("go").click(); });

  // --- Continue with Google ---
  $("google").onclick = async function () {
    if (!window.TL_CONFIGURED) return;
    $("google").disabled = true;
    try {
      var r = await window.sb.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: new URL("app.html", location.href).href }
      });
      if (r.error) throw r.error;
      // on success the browser redirects to Google; nothing more to do here
    } catch (e) {
      show(e.message || "Google sign-in isn't available yet.", false);
      $("google").disabled = false;
    }
  };

  // --- Forgot password ---
  $("forgot").onclick = async function () {
    if (!window.TL_CONFIGURED) return;
    var email = $("email").value.trim();
    if (!email) { show("Enter your email above, then tap \u201CForgot password?\u201D again.", false); $("email").focus(); return; }
    $("forgot").disabled = true;
    try {
      var r = await window.sb.auth.resetPasswordForEmail(email,
        { redirectTo: new URL("reset.html", location.href).href });
      if (r.error) throw r.error;
      show("Password reset link sent to " + email + ". Check your inbox (and spam).", true);
    } catch (e) {
      show(e.message || "Couldn't send the reset link.", false);
    } finally {
      $("forgot").disabled = false;
    }
  };
})();
</script>
</body>
</html>
