<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=8">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand"><span class="mono">TL</span>
      <span><b>T-Leng Tuition</b><small>Dashboard</small></span></div>

    <!-- sign in / sign up form -->
    <div id="form-area">
      <div class="tabs">
        <button id="tab-in" class="on">Sign in</button>
        <button id="tab-up">Create account</button>
      </div>
      <div class="field" id="name-field" style="display:none">
        <label for="name">Your name</label>
        <input id="name" type="text" autocomplete="name" placeholder="T-Leng">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="pw">Password</label>
        <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="go">Sign in</button>
      <div class="msg" id="msg"></div>
    </div>

    <!-- account-created success state -->
    <div id="created" style="display:none">
      <div class="ok-check">✓</div>
      <h2>Account created</h2>
      <p class="created-msg" id="created-msg"></p>
      <button class="btn btn-primary" id="to-login">Go to sign in</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script>
(function () {
  var mode = "in";
  var $ = function (id) { return document.getElementById(id); };
  var msg = $("msg");

  function setMode(m) {
    mode = m;
    $("tab-in").classList.toggle("on", m === "in");
    $("tab-up").classList.toggle("on", m === "up");
    $("name-field").style.display = m === "up" ? "block" : "none";
    $("go").textContent = m === "up" ? "Create account" : "Sign in";
    $("pw").autocomplete = m === "up" ? "new-password" : "current-password";
    msg.textContent = ""; msg.className = "msg";
  }
  $("tab-in").onclick = function () { setMode("in"); };
  $("tab-up").onclick = function () { setMode("up"); };

  function show(text, ok) { msg.textContent = text; msg.className = "msg " + (ok ? "ok" : "err"); }

  function showCreated(email, confirmNeeded) {
    $("form-area").style.display = "none";
    $("created").style.display = "block";
    $("created-msg").innerHTML = confirmNeeded
      ? "We've sent a confirmation link to <b>" + email + "</b>. Open it to verify your " +
        "address, then come back and sign in.<br><br>Didn't get it? Check spam, or your project " +
        "may have email confirmation disabled — in which case you can just sign in now."
      : "Your account <b>" + email + "</b> is ready. You can sign in now.";
  }
  $("to-login").onclick = function () {
    $("created").style.display = "none";
    $("form-area").style.display = "block";
    $("pw").value = ""; setMode("in"); $("email").focus();
  };

  if (!window.TL_CONFIGURED) {
    show("Set your Supabase URL + anon key in assets/js/config.js first.", false);
  } else {
    window.sb.auth.getSession().then(function (r) {
      if (r.data && r.data.session) location.replace("index.html");
    });
  }

  $("go").onclick = async function () {
    if (!window.TL_CONFIGURED) return;
    var email = $("email").value.trim(), pw = $("pw").value;
    if (!email || !pw) { show("Enter your email and password.", false); return; }
    $("go").disabled = true;
    try {
      if (mode === "up") {
        var name = $("name").value.trim();
        var up = await window.sb.auth.signUp(
          { email: email, password: pw, options: { data: { full_name: name } } });
        if (up.error) throw up.error;
        if (up.data.session) { location.replace("index.html"); return; }  // confirm off → logged in
        showCreated(email, true);                                         // confirm on → success screen
      } else {
        var inn = await window.sb.auth.signInWithPassword({ email: email, password: pw });
        if (inn.error) throw inn.error;
        location.replace("index.html");
      }
    } catch (e) {
      show(e.message || "Something went wrong.", false);
    } finally {
      $("go").disabled = false;
    }
  };

  $("pw").addEventListener("keydown", function (e) { if (e.key === "Enter") $("go").click(); });
})();
</script>
</body>
</html>
