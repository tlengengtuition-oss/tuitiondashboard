<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Planner · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=8">
</head>
<body>
<div id="view">
  <div class="toolbar">
    <div class="sub week-tot" id="p-total">Loading your schedule…</div>
    <button class="btn btn-gold" id="add-btn">+ Add slot</button>
  </div>

  <div class="week" id="week"></div>

  <div class="modal-backdrop" id="modal">
    <div class="modal card">
      <h2 id="m-title">Add weekly slot</h2>
      <div class="field">
        <label for="m-student">Student</label>
        <select id="m-student"></select>
      </div>
      <div class="row2">
        <div class="field">
          <label for="m-day">Day</label>
          <select id="m-day">
            <option value="0">Monday</option>
            <option value="1">Tuesday</option>
            <option value="2">Wednesday</option>
            <option value="3">Thursday</option>
            <option value="4">Friday</option>
            <option value="5">Saturday</option>
            <option value="6">Sunday</option>
          </select>
        </div>
        <div class="field">
          <label for="m-subject">Subject</label>
          <input id="m-subject" type="text" placeholder="e.g. Math">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label for="m-start">Start</label>
          <input id="m-start" type="time">
        </div>
        <div class="field">
          <label for="m-end">End</label>
          <input id="m-end" type="time">
        </div>
      </div>
      <div class="field">
        <label for="m-rate">Rate <span class="muted">(per hour, SGD)</span></label>
        <input id="m-rate" type="number" min="0" step="0.5" placeholder="50">
      </div>
      <div class="msg" id="m-msg"></div>
      <div class="modal-actions">
        <button class="btn" id="m-cancel">Cancel</button>
        <button class="btn btn-primary" id="m-save">Save slot</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/planner.js"></script>
</body>
</html>
