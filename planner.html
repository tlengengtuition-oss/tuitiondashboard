<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Planner · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=26">
<style>
  /* make the lesson time the visual anchor of each slot */
  .slot{padding-top:9px}
  .slot-row{display:flex;gap:6px;align-items:stretch}
  .slot-row .slot{flex:1;min-width:0}
  .slot-row .slot .s,.slot-row .slot .subj{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slot .t{color:var(--navy);font-weight:800;font-size:15px;letter-spacing:.01em;line-height:1.15}
  .slot .subj{color:var(--gold);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .slot .s{font-weight:600;font-size:13px;margin:3px 0 0;color:var(--ink)}
  .slot .c{color:var(--teal);font-weight:700;font-size:12.5px;margin-top:2px}
</style>
</head>
<body>
<div id="view">
  <div class="toolbar">
    <div class="sub week-tot" id="p-total">Loading your schedule…</div>
    <button class="btn" id="ics-btn" title="Download your timetable as a calendar file">Add to calendar</button>
    <button class="btn btn-gold" id="add-btn">+ Add slot</button>
  </div>

  <div class="week" id="week"></div>

  <div class="modal-backdrop" id="modal">
    <div class="modal card">
      <h2 id="m-title">Add weekly slot</h2>
      <div class="field">
        <label for="m-student">Student</label>
        <select id="m-student"></select>
      </div>
      <div class="field">
        <label for="m-day">Day</label>
        <select id="m-day">
          <option value="0">Monday</option>
          <option value="1">Tuesday</option>
          <option value="2">Wednesday</option>
          <option value="3">Thursday</option>
          <option value="4">Friday</option>
          <option value="5">Saturday</option>
          <option value="6">Sunday</option>
        </select>
      </div>
      <div class="row2">
        <div class="field">
          <label for="m-subject">Subject</label>
          <input id="m-subject" list="dl-subject" type="text" placeholder="e.g. Math"><datalist id="dl-subject"></datalist>
        </div>
        <div class="field">
          <label for="m-level">Level</label>
          <input id="m-level" type="text" placeholder="e.g. P6, Sec 3, JC1">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label for="m-start">Start</label>
          <input id="m-start" type="time">
        </div>
        <div class="field">
          <label for="m-end">End</label>
          <input id="m-end" type="time">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label for="m-rate">Rate <span class="muted">(per hour, SGD)</span></label>
          <input id="m-rate" type="number" min="0" step="0.5" placeholder="50">
        </div>
        <div class="field">
          <label for="m-split">Split between <span class="muted">(students)</span></label>
          <input id="m-split" type="number" min="1" step="1" value="1">
        </div>
      </div>
      <p class="muted" id="m-splithint" style="font-size:12.5px;margin:-4px 0 8px"></p>
      <div class="msg" id="m-msg"></div>
      <div class="modal-actions">
        <button class="btn" id="m-cancel">Cancel</button>
        <button class="btn btn-primary" id="m-save">Save slot</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=26"></script>
<script src="assets/js/supabase.js?v=26"></script>
<script src="assets/js/app.js?v=26"></script>
<script src="assets/js/planner.js?v=26"></script>
</body>
</html>
