<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendar · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=43">
<style>
  .cal-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .cal-nav{display:flex;align-items:center;gap:8px}
  .cal-nav .btn{padding:7px 12px}
  .cal-range{min-width:150px;text-align:center;font-weight:700;font-size:14.5px;color:var(--navy)}
  .cal-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .cal-right .seg{margin-bottom:0}
  .cal-legend{display:flex;align-items:center;gap:13px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .cal-legend .leg-key{display:inline-flex;align-items:center;gap:5px}
  .cal-legend .leg-sym{color:var(--navy);font-weight:800;font-size:12.5px}
  .cal-legend .leg{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .cal-legend .leg:hover{color:var(--ink)}
  .cal-legend .leg.off{opacity:.4;text-decoration:line-through}
  .cal-sw{width:12px;height:12px;border-radius:3px;border:1px solid}
  .sw-cancel{background:#f3f0e8;border-color:var(--line)}
  .sw-paid{background:rgba(14,124,123,.14);border-color:rgba(14,124,123,.5)}
  .sw-unpaid{background:rgba(179,64,47,.12);border-color:rgba(179,64,47,.5)}
  .sw-sched{background:rgba(26,42,79,.10);border-color:rgba(26,42,79,.4)}
  .sw-proj{background:rgba(181,137,43,.08);border:1px dashed rgba(181,137,43,.7)}
  .sw-clash{background:#fff;border:2px solid var(--owed)}

  .cal-card{padding:0;overflow:hidden}
  .cal-head{display:flex;border-bottom:1px solid var(--line)}
  .cal-gutter-h{flex:0 0 54px}
  .cal-day-h{flex:1;text-align:center;padding:9px 4px;border-left:1px solid var(--line);font-size:12px;color:var(--muted);font-weight:700}
  .cal-day-h b{display:block;color:var(--navy);font-size:16px;font-family:var(--serif);font-weight:600;margin-top:1px}
  .cal-day-h.today{background:var(--cream)}
  .cal-day-h.today b{margin:2px auto 0;width:26px;height:26px;border-radius:50%;background:var(--gold);
    color:#fff;display:grid;place-items:center;font-size:14px;line-height:1}

  .cal-body{display:flex;position:relative}
  .cal-gutter{flex:0 0 54px}
  .cal-hr{position:relative;border-top:1px solid var(--line)}
  .cal-hr:first-child{border-top:none}
  .cal-hr span{position:absolute;top:-8px;right:7px;font-size:10.5px;color:var(--muted);font-weight:600;background:var(--paper);padding:0 2px}
  .cal-cols{flex:1;display:flex;position:relative}
  .cal-col{flex:1;position:relative;border-left:1px solid var(--line)}
  .cal-col.today{background:rgba(251,244,228,.5)}

  .cal-ev{position:absolute;border-radius:7px;padding:3px 6px;overflow:hidden;border:1px solid;cursor:pointer;line-height:1.2;box-sizing:border-box}
  .cal-ev .ce-t{display:block;font-weight:700;font-size:10px;opacity:.75;white-space:nowrap}
  .cal-ev .ce-n{display:block;font-weight:700;font-size:11.5px;line-height:1.18;overflow-wrap:anywhere}
  .cal-ev .ce-s{display:block;font-size:10px;opacity:.85;line-height:1.18;overflow-wrap:anywhere}
  .cal-ev .ce-loc{display:block;font-size:9.5px;opacity:.72;line-height:1.18;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-ev.tight{padding:1px 6px}
  .cal-ev.tight .ce-t{display:inline} .cal-ev.tight .ce-n{display:inline;margin-left:4px}
  .cal-ev.tight .ce-s,.cal-ev.tight .ce-loc{display:none}
  .is-paid{background:rgba(14,124,123,.14);border-color:rgba(14,124,123,.5);color:#0b5b5a}
  .is-unpaid{background:rgba(179,64,47,.12);border-color:rgba(179,64,47,.5);color:#8a2f22}
  .is-sched{background:rgba(26,42,79,.10);border-color:rgba(26,42,79,.4);color:var(--navy)}
  .is-cancel{background:#f3f0e8;border-color:var(--line);color:var(--muted);opacity:.7}
  .is-cancel .ce-n{text-decoration:line-through}
  .is-proj{background:rgba(181,137,43,.08);border-style:dashed;border-color:rgba(181,137,43,.7);color:#7a5f1f}
  .is-clash{outline:2px solid var(--owed);outline-offset:-2px;border-color:var(--owed)}
  .ce-warn{color:var(--owed);font-weight:900;margin-left:3px}

  .cal-empty{padding:30px 20px;text-align:center;color:var(--muted);font-size:13.5px}

  /* month grid */
  .cal-mhead{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line)}
  .cal-mh{text-align:center;padding:8px 4px;font-size:11.5px;font-weight:700;color:var(--muted);border-left:1px solid var(--line)}
  .cal-mh:first-child{border-left:none}
  .cal-month{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-mday{min-height:96px;border-left:1px solid var(--line);border-top:1px solid var(--line);padding:4px 5px 6px;cursor:pointer;overflow:hidden}
  .cal-mday:nth-child(7n+1){border-left:none}
  .cal-mday:nth-child(-n+7){border-top:none}
  .cal-mday:hover{background:#fcfaf3}
  .cal-mday.other{background:#faf8f2}
  .cal-mday.other .md-num{color:#c3bba6}
  .cal-mday.today{background:var(--cream)}
  .cal-mday .md-num{font-weight:700;font-size:12.5px;color:var(--navy);margin-bottom:2px}
  .cal-mday.today .md-num{display:inline-grid;place-items:center;width:21px;height:21px;border-radius:50%;
    background:var(--gold);color:#fff;font-size:11.5px;line-height:1}
  .cal-chip{display:block;font-size:10.5px;font-weight:600;line-height:1.35;padding:1px 5px;margin-top:2px;
    border-radius:4px;border-left:3px solid;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .cal-chip.is-paid{background:rgba(14,124,123,.12);border-color:var(--teal);color:#0b5b5a}
  .cal-chip.is-unpaid{background:rgba(179,64,47,.10);border-color:var(--owed);color:#8a2f22}
  .cal-chip.is-sched{background:rgba(26,42,79,.08);border-color:var(--navy);color:var(--navy)}
  .cal-chip.is-cancel{background:#f3f0e8;border-color:var(--line);color:var(--muted);text-decoration:line-through}
  .cal-chip.is-proj{background:rgba(181,137,43,.08);border-color:rgba(181,137,43,.7);border-left-style:dashed;color:#7a5f1f}
  .cal-chip.is-clash{border-color:var(--owed);box-shadow:inset 0 0 0 1px var(--owed)}
  .cal-more{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600}

  .cal-pop{position:fixed;z-index:50;max-width:260px;background:var(--paper);border:1px solid var(--line);
    border-radius:12px;box-shadow:0 10px 34px rgba(20,30,60,.18);padding:14px 16px;font-size:13px}
  .cal-pop h4{font-family:var(--serif);font-size:16px;margin:0 0 3px;color:var(--navy)}
  .cal-pop .cp-row{color:var(--muted);margin:2px 0}
  .cal-pop .cp-row b{color:var(--ink);font-weight:600}
  .cal-pop .cp-tag{display:inline-block;margin-top:7px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .cal-pop .cp-act{display:block;margin-top:11px;text-align:center;background:var(--navy);color:#fff;
    text-decoration:none;font-weight:700;font-size:13px;border-radius:8px;padding:8px}
  .cal-pop .cp-x{position:absolute;top:8px;right:11px;cursor:pointer;color:var(--muted);font-size:18px;line-height:1}

  @media(max-width:820px){
    .cal-legend{display:none}
    .cal-day-h{font-size:10.5px;padding:7px 2px}
    .cal-day-h b{font-size:13px}
    .cal-gutter,.cal-gutter-h{flex-basis:38px}
    .cal-ev{padding:2px 4px}
    .cal-ev .ce-n{font-size:10.5px}
  }
</style>
</head>
<body>
<div id="view">
  <div class="cal-bar">
    <div class="cal-nav">
      <button class="btn" id="cal-prev" title="Previous week">&lsaquo;</button>
      <span class="cal-range" id="cal-range">—</span>
      <button class="btn" id="cal-next" title="Next week">&rsaquo;</button>
      <button class="btn" id="cal-today">Today</button>
    </div>
    <div class="cal-right">
      <div class="seg" id="cal-seg">
        <button id="seg-week" class="on">Week</button>
        <button id="seg-month">Month</button>
      </div>
      <div class="cal-legend">
        <button class="leg" data-cat="paid"><i class="cal-sw sw-paid"></i>Paid</button>
        <button class="leg" data-cat="unpaid"><i class="cal-sw sw-unpaid"></i>Unpaid</button>
        <button class="leg" data-cat="sched"><i class="cal-sw sw-sched"></i>Scheduled</button>
        <button class="leg" data-cat="proj"><i class="cal-sw sw-proj"></i>Not logged</button>
        <button class="leg" data-cat="cancel"><i class="cal-sw sw-cancel"></i>Cancelled</button>
        <span class="leg-key"><i class="cal-sw sw-clash"></i>Clash</span>
        <span class="leg-key"><b class="leg-sym">✦</b>One-off</span>
        <span class="leg-key"><b class="leg-sym">↻</b>Postponed</span>
      </div>
    </div>
  </div>
  <div class="card cal-card">
    <div class="cal" id="cal"><div class="cal-empty">Loading…</div></div>
  </div>
  <div id="cal-pop" class="cal-pop" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=43"></script>
<script src="assets/js/supabase.js?v=43"></script>
<script src="assets/js/app.js?v=43"></script>
<script src="assets/js/calendar.js?v=43"></script>
</body>
</html>
