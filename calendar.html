<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendar · T-Leng Tuition</title>
<link rel="stylesheet" href="assets/css/app.css?v=25">
<style>
  .cal-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .cal-nav{display:flex;align-items:center;gap:8px}
  .cal-nav .btn{padding:7px 12px}
  .cal-range{min-width:150px;text-align:center;font-weight:700;font-size:14.5px;color:var(--navy)}
  .cal-legend{display:flex;align-items:center;gap:13px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .cal-legend span{display:inline-flex;align-items:center;gap:6px}
  .cal-sw{width:12px;height:12px;border-radius:3px;border:1px solid}
  .sw-paid{background:rgba(14,124,123,.14);border-color:rgba(14,124,123,.5)}
  .sw-unpaid{background:rgba(179,64,47,.12);border-color:rgba(179,64,47,.5)}
  .sw-sched{background:rgba(26,42,79,.10);border-color:rgba(26,42,79,.4)}
  .sw-proj{background:rgba(181,137,43,.08);border:1px dashed rgba(181,137,43,.7)}
  .sw-clash{background:#fff;border:2px solid var(--owed)}

  .cal-card{padding:0;overflow:hidden}
  .cal-head{display:flex;border-bottom:1px solid var(--line)}
  .cal-gutter-h{flex:0 0 54px}
  .cal-day-h{flex:1;text-align:center;padding:9px 4px;border-left:1px solid var(--line);font-size:12px;color:var(--muted);font-weight:700}
  .cal-day-h b{display:block;color:var(--navy);font-size:16px;font-family:var(--serif);font-weight:600;margin-top:1px}
  .cal-day-h.today{background:var(--cream)}
  .cal-day-h.today b{color:var(--gold)}

  .cal-body{display:flex;position:relative}
  .cal-gutter{flex:0 0 54px}
  .cal-hr{position:relative;border-top:1px solid var(--line)}
  .cal-hr:first-child{border-top:none}
  .cal-hr span{position:absolute;top:-8px;right:7px;font-size:10.5px;color:var(--muted);font-weight:600;background:var(--paper);padding:0 2px}
  .cal-cols{flex:1;display:flex;position:relative}
  .cal-col{flex:1;position:relative;border-left:1px solid var(--line)}
  .cal-col.today{background:rgba(251,244,228,.5)}

  .cal-ev{position:absolute;border-radius:7px;padding:3px 6px;overflow:hidden;border:1px solid;cursor:pointer;line-height:1.2;box-sizing:border-box}
  .cal-ev .ce-t{font-weight:700;font-size:10px;opacity:.75;white-space:nowrap}
  .cal-ev .ce-n{font-weight:700;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-ev .ce-s{font-size:10px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-ev.tight{padding:1px 6px}
  .cal-ev.tight .ce-t{display:inline} .cal-ev.tight .ce-n{display:inline;margin-left:4px}
  .cal-ev.tight .ce-s{display:none}
  .is-paid{background:rgba(14,124,123,.14);border-color:rgba(14,124,123,.5);color:#0b5b5a}
  .is-unpaid{background:rgba(179,64,47,.12);border-color:rgba(179,64,47,.5);color:#8a2f22}
  .is-sched{background:rgba(26,42,79,.10);border-color:rgba(26,42,79,.4);color:var(--navy)}
  .is-cancel{background:#f3f0e8;border-color:var(--line);color:var(--muted);opacity:.7}
  .is-cancel .ce-n{text-decoration:line-through}
  .is-proj{background:rgba(181,137,43,.08);border-style:dashed;border-color:rgba(181,137,43,.7);color:#7a5f1f}
  .is-clash{outline:2px solid var(--owed);outline-offset:-2px;border-color:var(--owed)}
  .ce-warn{color:var(--owed);font-weight:900;margin-left:3px}

  .cal-empty{padding:30px 20px;text-align:center;color:var(--muted);font-size:13.5px}

  .cal-pop{position:fixed;z-index:50;max-width:260px;background:var(--paper);border:1px solid var(--line);
    border-radius:12px;box-shadow:0 10px 34px rgba(20,30,60,.18);padding:14px 16px;font-size:13px}
  .cal-pop h4{font-family:var(--serif);font-size:16px;margin:0 0 3px;color:var(--navy)}
  .cal-pop .cp-row{color:var(--muted);margin:2px 0}
  .cal-pop .cp-row b{color:var(--ink);font-weight:600}
  .cal-pop .cp-tag{display:inline-block;margin-top:7px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .cal-pop .cp-act{display:block;margin-top:11px;text-align:center;background:var(--navy);color:#fff;
    text-decoration:none;font-weight:700;font-size:13px;border-radius:8px;padding:8px}
  .cal-pop .cp-x{position:absolute;top:8px;right:11px;cursor:pointer;color:var(--muted);font-size:18px;line-height:1}

  @media(max-width:820px){
    .cal-legend{display:none}
    .cal-day-h{font-size:10.5px;padding:7px 2px}
    .cal-day-h b{font-size:13px}
    .cal-gutter,.cal-gutter-h{flex-basis:38px}
    .cal-ev{padding:2px 4px}
    .cal-ev .ce-n{font-size:10.5px}
  }
</style>
</head>
<body>
<div id="view">
  <div class="cal-bar">
    <div class="cal-nav">
      <button class="btn" id="cal-prev" title="Previous week">&lsaquo;</button>
      <span class="cal-range" id="cal-range">—</span>
      <button class="btn" id="cal-next" title="Next week">&rsaquo;</button>
      <button class="btn" id="cal-today">Today</button>
    </div>
    <div class="cal-legend">
      <span><i class="cal-sw sw-paid"></i>Paid</span>
      <span><i class="cal-sw sw-unpaid"></i>Unpaid</span>
      <span><i class="cal-sw sw-sched"></i>Scheduled</span>
      <span><i class="cal-sw sw-proj"></i>Not logged</span>
      <span><i class="cal-sw sw-clash"></i>Clash</span>
    </div>
  </div>
  <div class="card cal-card">
    <div class="cal" id="cal"><div class="cal-empty">Loading…</div></div>
  </div>
  <div id="cal-pop" class="cal-pop" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=25"></script>
<script src="assets/js/supabase.js?v=25"></script>
<script src="assets/js/app.js?v=25"></script>
<script src="assets/js/calendar.js?v=25"></script>
</body>
</html>
